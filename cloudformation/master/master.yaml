AWSTemplateFormatVersion: "2010-09-09"

Resources:

  EC2Stack:
    DependsOn:
      - CloudWatchStack
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://iac-bucket-azamcloud.s3.us-east-1.amazonaws.com/ec2.yaml
      
  CloudWatchStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://iac-bucket-azamcloud.s3.us-east-1.amazonaws.com/cloudwatch.yaml

  SsmStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://iac-bucket-azamcloud.s3.us-east-1.amazonaws.com/ssm.yaml

  OpenSearchStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://iac-bucket-azamcloud.s3.us-east-1.amazonaws.com/opensearch.yaml
      Parameters:
        OpenSearchLogGroup: !GetAtt CloudWatchStack.Outputs.OpenSearchLogGroupArn

  LambdaStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://iac-bucket-azamcloud.s3.us-east-1.amazonaws.com/Lambda.yaml
      Parameters:
        OpenSearchDomain: !GetAtt OpenSearchStack.Outputs.OpenSearchDomainName
        LambdaLogGroup: !GetAtt CloudWatchStack.Outputs.LambdaLogGroupName
        OpenSearchEndpoint: !GetAtt OpenSearchStack.Outputs.OpenSearchDomainEndpoint
        ApplicationLogGroup: !GetAtt CloudWatchStack.Outputs.ApplicationLogGroupName
        

    






